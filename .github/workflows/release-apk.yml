name: Release APK

on:
  workflow_dispatch:

# Needed to publish the signed APK as a GitHub Release (Obtainium tracks these).
permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Setup Android SDK build tools
        run: |
          $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager "build-tools;36.0.0"
          echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Build APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Align and sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo ${KEYSTORE_BASE64} | base64 -d > keystore

          echo "Aligning APK..."

          zipalign -f -p -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            aligned.apk

          echo "Signing APK with keystore..."

          apksigner sign \
            --alignment-preserved \
            --ks keystore \
            --ks-key-alias ${KEY_ALIAS} \
            --ks-pass "pass:${KEYSTORE_PASSWORD}" \
            --out signed.apk \
            aligned.apk
          
          echo "APK signed successfully."

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: signed.apk
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub release (Obtainium update channel)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -m1 '^version-name' gradle/libs.versions.toml | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"
          APK="FoodYou-${TAG}.apk"
          cp signed.apk "$APK"
          gh release create "$TAG" "$APK" \
            --title "FoodYou ${TAG} (${SHORT_SHA})" \
            --notes "Signed release build of ${GITHUB_SHA}." \
            --latest
